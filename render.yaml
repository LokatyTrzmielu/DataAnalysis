services:
  # ────────────────────────────────
  # FastAPI backend
  # ────────────────────────────────
  - type: web
    name: dataanalysis-api
    runtime: python
    buildCommand: pip install -e ".[dev]"
    startCommand: python -m api.seed && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_URL
        value: https://dataanalysis-frontend.onrender.com
      - key: DATABASE_URL
        sync: false          # Set in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Auto-generate per deployment
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"        # 24h
    disk:
      name: uploads-data
      mountPath: /data
      sizeGB: 10

  # ────────────────────────────────
  # Vue 3 frontend (static site)
  # ────────────────────────────────
  - type: static
    name: dataanalysis-frontend
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
